<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Pré-visualização — Google Form (iframe)</title>
  <style>
    body { margin: 0; font-family: system-ui, sans-serif; background: #f5f5f5; }
    .wrap { max-width: 680px; margin: 0 auto; padding: 16px; }
    h1 { font-size: 1rem; font-weight: 600; color: #333; margin: 0 0 12px; }
    iframe { display: block; width: 640px; max-width: 100%; height: 1919px; border: 0; background: #fff; box-shadow: 0 1px 3px rgba(0,0,0,.12); }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Formulário (embedded)</h1>
    <iframe src="https://docs.google.com/forms/d/e/1FAIpQLSdZgUCsdah8ED2bieRUFbjw4wuzOO-bouQTxW18xhjLdhyp-Q/viewform?embedded=true" width="640" height="1919" title="Google Form">Carregando…</iframe>
  </div>
</body>
</html>
